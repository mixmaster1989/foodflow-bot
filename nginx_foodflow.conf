server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    
    # Catch all domains pointing to this IP
    server_name xn--d1aojrdbc.xn--p1ai www.xn--d1aojrdbc.xn--p1ai tretyakov-igor.tech www.tretyakov-igor.tech _;
    
    ssl_certificate /etc/letsencrypt/live/xn--d1aojrdbc.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--d1aojrdbc.xn--p1ai/privkey.pem;

    root /home/user1/foodflow-bot_new/landing;
    index index.html;
    
    # error_log /var/log/nginx/foodflow_error.log info;
    error_log /var/log/nginx/foodflow_error.log;

    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Basic headers
    add_header Access-Control-Allow-Origin * always;
    add_header X-Content-Type-Options "nosniff" always;

    # TEMPORARILY DISABLED CSP FOR MINIMALIST TEST
    # set $csp "...";

    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        # add_header Content-Security-Policy $csp always;
        add_header Access-Control-Allow-Origin * always;
        add_header X-Content-Type-Options "nosniff" always;
        expires off;
        etag off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /foodflow {
        if ($request_uri ~* ^/foodflow\?(.*)$ ) {
            return 301 $scheme://$http_host/foodflow/?$1;
        }
        if ($request_uri ~* ^/foodflow$ ) {
            return 301 $scheme://$http_host/foodflow/;
        }
        
        try_files $uri $uri/ /foodflow/index.html;
        
        # add_header Content-Security-Policy $csp always;
        add_header Access-Control-Allow-Origin * always;
        add_header X-Content-Type-Options "nosniff" always;

        location ~* \.html$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            # add_header Content-Security-Policy $csp always;
            add_header Access-Control-Allow-Origin * always;
            add_header X-Content-Type-Options "nosniff" always;
            expires off;
            etag off;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
        # add_header Content-Security-Policy $csp always;
    }
}
