server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name tretyakov-igor.tech www.tretyakov-igor.tech tretyakov-igor.online www.tretyakov-igor.online tretyakov-igor.ru www.tretyakov-igor.ru igortretyakov.ru www.igortretyakov.ru;

    # Force HTTPS
    return 301 https://tretyakov-igor.tech$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name tretyakov-igor.tech www.tretyakov-igor.tech tretyakov-igor.online www.tretyakov-igor.online tretyakov-igor.ru www.tretyakov-igor.ru igortretyakov.ru www.igortretyakov.ru;
    
    ssl_certificate /etc/letsencrypt/live/tretyakov-igor.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tretyakov-igor.tech/privkey.pem;

    root /home/user1/foodflow-bot_new/frontend/dist;
    index index.html;
    
    access_log /var/log/nginx/foodflow_access.log;
    error_log /var/log/nginx/foodflow_error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mini App
    location /foodflow/ {
        alias /home/user1/foodflow-bot_new/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /foodflow/index.html;
        
        add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://web.t.me https://*.web.telegram.org https://*.web.t.me;" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}

